name: WuhuApp

options:
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 97W7A3Y9GD
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "1"

packages:
  WuhuCore:
    url: https://github.com/wuhu-labs/wuhu-core.git
    from: 0.5.0
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: 1.23.1
  IdentifiedCollections:
    url: https://github.com/pointfreeco/swift-identified-collections
    from: 1.1.1
  Dependencies:
    url: https://github.com/pointfreeco/swift-dependencies
    from: 1.11.0
  CasePaths:
    url: https://github.com/pointfreeco/swift-case-paths
    from: 1.7.2
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0
  Inject:
    url: https://github.com/krzysztofzablocki/Inject
    from: 1.5.2
  InjectionNext:
    url: https://github.com/johnno1962/InjectionNext
    from: 1.5.2

targets:
  WuhuApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - Info-macOS.plist
          - WuhuAppMac.entitlements
          - Updater.swift
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Wuhu
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Sources/WuhuApp.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ms.liu.wuhu.ios
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        SWIFT_VERSION: "6.0"
        DISABLE_DIAMOND_PROBLEM_DIAGNOSTIC: YES
        ENABLE_APP_SANDBOX: YES
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
    dependencies:
      - package: WuhuCore
        product: WuhuAPI
      - package: WuhuCore
        product: WuhuClient
      - package: WuhuCore
        product: WuhuCoreClient
      - package: ComposableArchitecture
        product: ComposableArchitecture
      - package: IdentifiedCollections
        product: IdentifiedCollections
      - package: Dependencies
        product: Dependencies
      - package: CasePaths
        product: CasePaths
      - package: MarkdownUI
        product: MarkdownUI

  WuhuAppMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - Info.plist
          - WuhuApp.entitlements
    info:
      path: Sources/Info-macOS.plist
      properties:
        CFBundleDisplayName: Wuhu
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        NSMainStoryboardFile: ""
        LSApplicationCategoryType: public.app-category.developer-tools
        SUFeedURL: "https://wuhu.ai/releases/appcast.xml"
        SUPublicEDKey: "cLD5wooImNT4Loh8TXGByHrSKnKtzU5T4As3L5L5BA4="
        SUEnableInstallerLauncherService: true
    entitlements:
      path: Sources/WuhuAppMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.temporary-exception.mach-lookup.global-name:
          - "$(PRODUCT_BUNDLE_IDENTIFIER)-spks"
          - "$(PRODUCT_BUNDLE_IDENTIFIER)-spki"
    settings:
      base:
        PRODUCT_NAME: Wuhu
        PRODUCT_BUNDLE_IDENTIFIER: ms.liu.wuhu.macos
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_VERSION: "6.0"
        DISABLE_DIAMOND_PROBLEM_DIAGNOSTIC: YES
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
    dependencies:
      - package: WuhuCore
        product: WuhuAPI
      - package: WuhuCore
        product: WuhuClient
      - package: WuhuCore
        product: WuhuCoreClient
      - package: ComposableArchitecture
        product: ComposableArchitecture
      - package: IdentifiedCollections
        product: IdentifiedCollections
      - package: Dependencies
        product: Dependencies
      - package: CasePaths
        product: CasePaths
      - package: MarkdownUI
        product: MarkdownUI
      - framework: Frameworks/Sparkle.xcframework
        embed: true

  WuhuPreview:
    type: application
    platform: iOS
    sources:
      - path: WuhuPreview
    info:
      path: WuhuPreview/Info.plist
      properties:
        CFBundleDisplayName: WuhuPreview
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ms.liu.wuhu.preview
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        SWIFT_VERSION: "6.0"
        EMIT_FRONTEND_COMMAND_LINES: YES
      configs:
        debug:
          OTHER_LDFLAGS: ["-Xlinker", "-interposable"]
    scheme:
      environmentVariables:
        - variable: INJECTION_PROJECT_ROOT
          value: $(SRCROOT)
          isEnabled: true
    dependencies:
      - package: Inject
        product: Inject
      - package: InjectionNext
        product: InjectionNext
