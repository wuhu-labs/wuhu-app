name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'features/*'

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Sparkle
        run: ./scripts/fetch-sparkle.sh

      - name: Generate Xcode project
        run: cd WuhuApp && xcodegen generate

      - name: Build macOS
        run: >
          xcodebuild build
          -project WuhuApp/WuhuApp.xcodeproj
          -scheme WuhuAppMac
          -destination 'platform=macOS'
          -skipMacroValidation
          -skipPackagePluginValidation
          CODE_SIGN_IDENTITY=""
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGNING_ALLOWED=NO
          -quiet

      - name: Build iOS
        run: >
          xcodebuild build
          -project WuhuApp/WuhuApp.xcodeproj
          -scheme WuhuApp
          -destination 'generic/platform=iOS'
          -skipMacroValidation
          -skipPackagePluginValidation
          CODE_SIGN_IDENTITY=""
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGNING_ALLOWED=NO
          -quiet
