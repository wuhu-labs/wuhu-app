name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-mac:
    name: Build & Publish macOS
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"              # e.g. v1.0.1-27
          TAG="${TAG#v}"                         # strip leading v → 1.0.1-27
          MARKETING="${TAG%-*}"                  # everything before last hyphen → 1.0.1
          BUILD="${TAG##*-}"                     # everything after last hyphen → 27
          echo "marketing=$MARKETING" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $MARKETING ($BUILD)"

      - name: Unlock Keychain
        run: security unlock-keychain -p "$KEYCHAIN_PASSWORD" ~/Library/Keychains/login.keychain-db
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Build notarized macOS app
        run: ./scripts/build-notarized-mac.sh --no-upload
        env:
          MARKETING_VERSION: ${{ steps.version.outputs.marketing }}
          BUILD_NUMBER: ${{ steps.version.outputs.build }}

      - name: Publish to R2
        run: ./scripts/publish-release.sh ./build-mac/Wuhu.zip
        env:
          MARKETING_VERSION: ${{ steps.version.outputs.marketing }}
          BUILD_NUMBER: ${{ steps.version.outputs.build }}

  release-ios:
    name: Build & Upload to TestFlight
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"              # e.g. v1.0.1-27
          TAG="${TAG#v}"                         # strip leading v → 1.0.1-27
          MARKETING="${TAG%-*}"                  # everything before last hyphen → 1.0.1
          BUILD="${TAG##*-}"                     # everything after last hyphen → 27
          echo "marketing=$MARKETING" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $MARKETING ($BUILD)"

      - name: Unlock Keychain
        run: security unlock-keychain -p "$KEYCHAIN_PASSWORD" ~/Library/Keychains/login.keychain-db
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Build and upload to TestFlight
        run: ./scripts/build-testflight.sh
        env:
          MARKETING_VERSION: ${{ steps.version.outputs.marketing }}
          BUILD_NUMBER: ${{ steps.version.outputs.build }}
